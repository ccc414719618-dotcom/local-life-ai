<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定位中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      opacity: 0.9;
    }
    .error {
      background: rgba(255,100,100,0.3);
      padding: 16px 24px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }
    .success {
      background: rgba(100,255,100,0.3);
      padding: 16px 24px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 id="title">正在获取您的位置...</h1>
    <p id="subtitle">请允许位置权限，以获得更精准的推荐</p>
    <div class="error" id="error">
      <p>定位失败，请检查是否开启了位置权限</p>
      <p style="margin-top:8px;font-size:14px;"><a href="/" style="color:white;">返回首页</a></p>
    </div>
    <div class="success" id="success">
      <p>✅ 定位成功！正在跳转...</p>
    </div>
  </div>

  <script>
    // 从 URL 获取 shop_id
    const params = new URLSearchParams(window.location.search);
    const shopId = params.get('shop_id') || 'default';
    
    // 尝试获取位置
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        // 成功
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          // 上报位置到服务器
          fetch('/api/location/report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              shop_id: shopId,
              lat: lat,
              lng: lng,
              source: 'qr_scan'
            })
          }).then(() => {
            // 保存到本地并跳转
            localStorage.setItem('user_lat', lat);
            localStorage.setItem('user_lng', lng);
            
            document.getElementById('title').textContent = '定位成功!';
            document.getElementById('subtitle').textContent = '正在跳转...';
            document.getElementById('success').style.display = 'block';
            
            setTimeout(() => {
              window.location.href = '/?lat=' + lat + '&lng=' + lng;
            }, 500);
          }).catch(() => {
            // 上报失败仍然跳转
            window.location.href = '/';
          });
        },
        // 失败
        (err) => {
          console.log('Geolocation error:', err);
          document.getElementById('title').textContent = '定位被拒绝';
          document.getElementById('subtitle').textContent = '将使用近似位置';
          document.getElementById('error').style.display = 'block';
          
          // 使用 IP 定位降级
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        },
        // 选项
        {
          enableHighAccuracy: true,
          timeout: 5000,
          maximumAge: 60000
        }
      );
    } else {
      document.getElementById('title').textContent = '浏览器不支持定位';
      document.getElementById('subtitle').textContent = '将使用近似位置';
      document.getElementById('error').style.display = 'block';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    }
  </script>
</body>
</html>
