<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家二维码 - 本地生活 AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .shop-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .shop-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .shop-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .shop-id {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }
    .qr-container {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .qr-code {
      width: 120px;
      height: 120px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    .qr-code img {
      width: 100%;
      height: 100%;
    }
    .qr-info {
      flex: 1;
    }
    .qr-url {
      font-size: 11px;
      color: #666;
      word-break: break-all;
      margin-bottom: 8px;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      background: #007AFF;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      margin-top: 8px;
    }
    .btn:hover {
      background: #0056b3;
    }
    .note {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 商家二维码</h1>
    <p style="text-align:center;color:#666;margin-bottom:20px;">
      扫描二维码获取精确位置，享受更精准的推荐
    </p>
    
    <div class="shop-list" id="shopList">
      <!-- 动态加载 -->
    </div>
  </div>

  <script>
    // 店铺数据
    const shops = [
      { id: 'jin_001', name: '金谷园饺子馆', address: '北京市海淀区新地址' },
      { id: 'hong_001', name: '宏缘火锅', address: '北京市海淀区学院路甲38号' },
      { id: 'ji_001', name: '季多西面馆', address: '北京市海淀区中关村' },
      { id: 'xin_001', name: '兴华家常菜', address: '北京市海淀区清华' }
    ];

    // 获取 base URL
    const baseUrl = window.location.origin;
    
    const list = document.getElementById('shopList');
    
    shops.forEach(shop => {
      const locateUrl = `${baseUrl}/locate?shop_id=${shop.id}`;
      
      // 使用 qrserver.com API 生成二维码
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(locateUrl)}`;
      
      const card = document.createElement('div');
      card.className = 'shop-card';
      card.innerHTML = `
        <div class="shop-name">${shop.name}</div>
        <div class="shop-id">ID: ${shop.id}</div>
        <div class="qr-container">
          <div class="qr-code">
            <img src="${qrUrl}" alt="二维码" onerror="this.parentElement.innerHTML='<span style=font-size:10px>加载失败</span>'">
          </div>
          <div class="qr-info">
            <div class="qr-url">${locateUrl}</div>
            <a href="${locateUrl}" target="_blank" class="btn">测试定位</a>
            <div class="note">用户扫描此二维码 → 自动获取位置 → 精准推荐</div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  </script>
</body>
</html>
